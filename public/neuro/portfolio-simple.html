<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Matrix - Simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <h1 class="text-2xl font-bold mb-6">Product Portfolio Matrix</h1>
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-800">
                <tr>
                    <th class="p-3 text-left">Category</th>
                    <th class="p-3 text-left">Wallaby</th>
                    <th class="p-3 text-left">Medtronic</th>
                    <th class="p-3 text-left">Stryker</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-700">
                <tr class="hover:bg-slate-800">
                    <td class="p-3 font-medium">Coils</td>
                    <td class="p-3"><span class="text-emerald-400"><i class="fas fa-check-circle"></i></span> Avenir</td>
                    <td class="p-3"><span class="text-emerald-400"><i class="fas fa-check-circle"></i></span> Axium</td>
                    <td class="p-3"><span class="text-emerald-400"><i class="fas fa-check-circle"></i></span> Target</td>
                </tr>
                <tr class="hover:bg-slate-800">
                    <td class="p-3 font-medium text-red-300">Aspiration Pump</td>
                    <td class="p-3"><span class="text-red-400"><i class="fas fa-times-circle"></i></span> GAP</td>
                    <td class="p-3"><span class="text-red-400"><i class="fas fa-times-circle"></i></span> None</td>
                    <td class="p-3"><span class="text-emerald-400"><i class="fas fa-check-circle"></i></span> AXS</td>
                </tr>
            </tbody>
        </table>
    </div>
    <p class="mt-4 text-slate-400">If you see green checkmarks and red X's above, Font Awesome is working.</p>
</body>
</html>
