<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Neurovascular Heat Map</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #3B82F6;
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 300px;
        }
        .heatmap-circle {
            cursor: pointer;
            transition: all 0.3s;
        }
        .heatmap-circle:hover {
            stroke: white;
            stroke-width: 3px;
            filter: brightness(1.3);
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; transform: scale(1.1); }
            100% { opacity: 0.6; }
        }
        .country-path {
            fill: #1e293b;
            stroke: #334155;
            stroke-width: 0.5;
            transition: fill 0.3s;
        }
        .country-path:hover {
            fill: #334155;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
    <div class="p-4">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h2 class="text-xl font-bold text-white">Global Neurovascular Burden</h2>
                <p class="text-sm text-slate-400">Heat map showing stroke and aneurysm cases by region. Hover for details.</p>
            </div>
            <div class="flex gap-4 text-sm">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span class="text-slate-400">High (>500K)</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-orange-500"></span>
                    <span class="text-slate-400">Medium (100-500K)</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                    <span class="text-slate-400">Low (<100K)</span>
                </div>
            </div>
        </div>

        <div id="map-container" class="relative w-full">
            <svg id="world-map" viewBox="0 0 1000 600" class="w-full h-auto" preserveAspectRatio="xMidYMid meet">
                <!-- Realistic continent outlines - SCALED PROPERLY -->
                <g id="countries" transform="scale(0.9) translate(50, 20)">
                    <!-- North America -->
                    <path class="country-path" d="M80,40 L120,35 L160,32 L200,35 L240,42 L280,50 L320,62 L360,80 L390,105 L410,135 L420,165 L425,195 L420,225 L405,250 L385,270 L360,285 L330,295 L300,300 L270,305 L240,308 L210,305 L180,295 L155,280 L135,260 L120,235 L110,205 L105,175 L102,145 L100,115 L98,85 L85,60 L80,45 Z" />
                    
                    <!-- Greenland -->
                    <path class="country-path" d="M400,25 L440,22 L465,32 L475,50 L470,75 L455,95 L430,100 L410,90 L400,70 L395,45 Z" />
                    
                    <!-- South America -->
                    <path class="country-path" d="M280,320 L310,315 L335,325 L355,345 L370,370 L380,400 L385,435 L385,470 L380,505 L370,535 L355,560 L335,580 L310,592 L285,595 L260,590 L240,575 L225,555 L215,530 L210,500 L208,470 L210,440 L215,410 L222,380 L232,355 L245,335 L262,322 Z" />
                    
                    <!-- Europe -->
                    <path class="country-path" d="M480,65 L510,58 L540,55 L570,58 L595,68 L615,82 L630,100 L640,120 L645,140 L642,158 L632,172 L615,180 L595,185 L575,188 L555,190 L535,188 L515,182 L498,172 L485,158 L478,142 L475,122 L475,100 L478,82 Z" />
                    
                    <!-- Africa -->
                    <path class="country-path" d="M480,195 L510,190 L540,192 L570,202 L595,220 L615,245 L630,275 L640,310 L645,350 L642,390 L635,425 L622,455 L605,480 L585,500 L560,515 L535,522 L510,520 L488,510 L470,492 L458,468 L450,438 L445,405 L442,370 L440,335 L438,300 L440,265 L445,235 L455,210 L470,195 Z" />
                    
                    <!-- Middle East -->
                    <path class="country-path" d="M620,155 L650,152 L675,158 L695,175 L710,198 L720,222 L725,245 L720,265 L710,280 L695,290 L675,295 L655,292 L638,282 L625,265 L618,245 L615,222 L615,200 L618,178 Z" />
                    
                    <!-- Asia (Russia, China, India, etc.) -->
                    <path class="country-path" d="M550,35 L600,28 L655,22 L710,20 L765,25 L815,35 L860,50 L895,75 L920,105 L935,140 L942,175 L940,205 L928,232 L908,252 L882,265 L850,272 L815,275 L778,278 L740,280 L705,282 L672,288 L645,295 L620,298 L595,295 L572,285 L555,268 L545,245 L540,218 L538,190 L538,162 L540,135 L542,108 L545,82 L548,58 Z" />
                    
                    <!-- Southeast Asia -->
                    <path class="country-path" d="M720,265 L745,258 L770,262 L792,278 L810,302 L822,330 L830,360 L832,390 L828,418 L818,442 L802,460 L782,472 L760,478 L738,475 L720,465 L708,448 L702,428 L700,405 L702,382 L708,358 L718,335 L728,312 L738,292 L748,278 Z" />
                    
                    <!-- Japan -->
                    <path class="country-path" d="M860,145 L882,138 L902,148 L915,172 L922,200 L925,230 L922,258 L915,280 L902,295 L885,300 L868,292 L855,275 L848,252 L845,225 L848,198 L852,172 Z" />
                    
                    <!-- Australia -->
                    <path class="country-path" d="M800,420 L850,412 L895,408 L932,415 L958,432 L972,458 L978,488 L975,518 L965,545 L948,568 L925,585 L895,595 L862,598 L830,592 L800,580 L775,562 L755,538 L742,510 L735,480 L735,450 L742,425 L758,405 L780,392 Z" />
                    
                    <!-- New Zealand -->
                    <path class="country-path" d="M990,500 L1010,495 L1028,505 L1040,525 L1045,548 L1042,570 L1032,588 L1018,598 L1002,600 L988,592 L978,578 L972,560 L970,540 L975,520 L985,505 Z" />
                </g>
                
                <!-- Heat spots will be added here -->
                <g id="heat-spots"></g>
            </svg>
            <div id="tooltip" class="tooltip"></div>
        </div>
    </div>

    <script>
        // Regional data with coordinates and case estimates - ADJUSTED FOR NEW SCALING
        const regionData = [
            {
                name: 'United States',
                code: 'USA',
                cases: 795000,
                evt: 200000,
                aneurysm: 30000,
                x: 230,
                y: 175,
                severity: 'high',
                details: '795K stroke cases/year, 30K aneurysm cases'
            },
            {
                name: 'Germany',
                code: 'DEU',
                cases: 270000,
                evt: 65000,
                aneurysm: 8500,
                x: 545,
                y: 130,
                severity: 'high',
                details: '270K stroke cases/year, strong EVT access'
            },
            {
                name: 'France',
                code: 'FRA',
                cases: 140000,
                evt: 35000,
                aneurysm: 5500,
                x: 515,
                y: 145,
                severity: 'medium',
                details: '140K stroke cases/year, improving EVT rates'
            },
            {
                name: 'United Kingdom',
                code: 'GBR',
                cases: 100000,
                evt: 25000,
                aneurysm: 5000,
                x: 500,
                y: 118,
                severity: 'medium',
                details: '100K stroke cases/year, centralized MT centers'
            },
            {
                name: 'Italy',
                code: 'ITA',
                cases: 120000,
                evt: 28000,
                aneurysm: 4200,
                x: 545,
                y: 160,
                severity: 'medium',
                details: '120K stroke cases/year, regional disparities'
            },
            {
                name: 'Spain',
                code: 'ESP',
                cases: 110000,
                evt: 26000,
                aneurysm: 3800,
                x: 505,
                y: 172,
                severity: 'medium',
                details: '110K stroke cases/year, growing EVT network'
            },
            {
                name: 'China',
                code: 'CHN',
                cases: 2500000,
                evt: 400000,
                aneurysm: 180000,
                x: 750,
                y: 210,
                severity: 'high',
                details: '2.5M stroke cases/year, massive growth market'
            },
            {
                name: 'Japan',
                code: 'JPN',
                cases: 320000,
                evt: 80000,
                aneurysm: 45000,
                x: 840,
                y: 185,
                severity: 'high',
                details: '320K stroke cases/year, high aneurysm incidence'
            },
            {
                name: 'South Korea',
                code: 'KOR',
                cases: 110000,
                evt: 27500,
                aneurysm: 12000,
                x: 815,
                y: 200,
                severity: 'medium',
                details: '110K stroke cases/year, advanced healthcare'
            },
            {
                name: 'Australia',
                code: 'AUS',
                cases: 56000,
                evt: 14000,
                aneurysm: 2500,
                x: 880,
                y: 420,
                severity: 'low',
                details: '56K stroke cases/year, high EVT adoption'
            },
            {
                name: 'Brazil',
                code: 'BRA',
                cases: 180000,
                evt: 35000,
                aneurysm: 8500,
                x: 335,
                y: 390,
                severity: 'high',
                details: '180K stroke cases/year, emerging market'
            },
            {
                name: 'India',
                code: 'IND',
                cases: 1400000,
                evt: 150000,
                aneurysm: 65000,
                x: 695,
                y: 265,
                severity: 'high',
                details: '1.4M stroke cases/year, huge unmet need'
            }
        ];

        // Create heat spots
        const svg = document.getElementById('world-map');
        const heatSpotsGroup = document.getElementById('heat-spots');
        const tooltip = document.getElementById('tooltip');

        regionData.forEach(region => {
            // Calculate radius based on cases
            const baseRadius = Math.sqrt(region.cases) / 80;
            const radius = Math.max(8, Math.min(50, baseRadius));
            
            // Determine color based on severity
            let color;
            switch(region.severity) {
                case 'high': color = '#EF4444'; break;
                case 'medium': color = '#F59E0B'; break;
                default: color = '#EAB308';
            }
            
            // Create group for this region
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'heat-spot');
            
            // Outer glow circle
            const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            glow.setAttribute('cx', region.x);
            glow.setAttribute('cy', region.y);
            glow.setAttribute('r', radius * 1.5);
            glow.setAttribute('fill', color);
            glow.setAttribute('opacity', '0.2');
            glow.setAttribute('class', 'pulse');
            g.appendChild(glow);
            
            // Main circle
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', region.x);
            circle.setAttribute('cy', region.y);
            circle.setAttribute('r', radius);
            circle.setAttribute('fill', color);
            circle.setAttribute('opacity', '0.7');
            circle.setAttribute('class', 'heatmap-circle');
            
            // Add hover events
            circle.addEventListener('mouseenter', (e) => {
                tooltip.style.opacity = '1';
                tooltip.innerHTML = `
                    <div class="text-left">
                        <div class="font-bold text-lg text-white mb-1">${region.name}</div>
                        <div class="text-sm text-slate-300 mb-2">${region.details}</div>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div class="bg-slate-800 rounded px-2 py-1">
                                <div class="text-slate-400">Stroke Cases</div>
                                <div class="text-emerald-400 font-mono">${region.cases.toLocaleString()}</div>
                            </div>
                            <div class="bg-slate-800 rounded px-2 py-1">
                                <div class="text-slate-400">EVT Potential</div>
                                <div class="text-blue-400 font-mono">${region.evt.toLocaleString()}</div>
                            </div>
                            <div class="bg-slate-800 rounded px-2 py-1">
                                <div class="text-slate-400">Aneurysm</div>
                                <div class="text-orange-400 font-mono">${region.aneurysm.toLocaleString()}</div>
                            </div>
                            <div class="bg-slate-800 rounded px-2 py-1">
                                <div class="text-slate-400">Severity</div>
                                <div class="text-${region.severity === 'high' ? 'red' : region.severity === 'medium' ? 'orange' : 'yellow'}-400">${region.severity.toUpperCase()}</div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Position tooltip
                const rect = circle.getBoundingClientRect();
                tooltip.style.left = (rect.left + 15) + 'px';
                tooltip.style.top = (rect.top - 10) + 'px';
            });
            
            circle.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
            
            circle.addEventListener('click', () => {
                // Navigate to epidemiology
                if (window.parent) {
                    window.parent.postMessage({action: 'navigate', section: 'epidemiology'}, '*');
                }
            });
            
            g.appendChild(circle);
            
            // Add label for major markets
            if (region.cases > 200000) {
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', region.x);
                text.setAttribute('y', region.y + radius + 15);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('class', 'text-xs fill-slate-300 pointer-events-none');
                text.setAttribute('font-size', '10');
                text.textContent = region.code;
                g.appendChild(text);
            }
            
            heatSpotsGroup.appendChild(g);
        });

        console.log('Heat map loaded successfully with', regionData.length, 'regions');
    </script>
</body>
</html>
